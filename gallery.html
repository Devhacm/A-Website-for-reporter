<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — ReporterHQ</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="home">
  <header class="container site-header">
    <div class="site-title">ReporterHQ</div>
    <nav class="site-nav">
      <a href="./index.html" class="btn">Home</a>
      <a href="./gallery.html" class="btn btn--primary">Gallery</a>
      <a href="./login.html" class="btn">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <h1>Photo gallery</h1>
        <p>Browse the latest photos from the newsroom. Add or remove images from the admin panel.</p>
      </div>
      <img class="hero-illustration" src="https://images.unsplash.com/photo-1495020689067-958852a7765e?auto=format&fit=crop&w=900&q=70" alt="Camera lens" />
    </section>

    <section class="section">
      <h2>Latest photos</h2>
      <div id="gallery-preview" class="gallery"></div>
    </section>
  </main>

  <footer class="container" style="padding: 2rem 0; text-align: center; color: rgba(163, 179, 198, 0.7);">
    Add new photos from the admin panel to keep the gallery fresh.
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
